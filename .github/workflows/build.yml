name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI release tag (e.g. v0.27.0)"
        required: false
        default: "v0.27.0"
        type: string
      pytorch_cuda_tag:
        description: "PyTorch CUDA tag (e.g. cu118, cu126, cu128)"
        required: false
        default: "cu128"
        type: string
      image_tag:
        description: "Override image tag (default: v<comfyui>-<cuda_tag>-pt<torch> for tag push, 'dev' for manual)"
        required: false
        type: string

env:
  IMAGE_NAME: derekhsu/comfyui-gputw

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine ComfyUI version
        id: comfyui
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # strip leading "v" from the git tag, e.g. v0.27.0 -> 0.27.0
            VERSION="${GITHUB_REF_NAME#v}"
            echo "comfyui_version=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${{ inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute build args
        id: args
        run: |
          # Use shell parameter expansion for actual fallback (GitHub Actions
          # expression `||` does NOT fall back from empty string).
          COMFYUI_VERSION="${{ steps.comfyui.outputs.comfyui_version }}"
          PYTORCH_CUDA_TAG="${PYTORCH_CUDA_TAG:-${{ inputs.pytorch_cuda_tag }}}"
          PYTORCH_CUDA_TAG="${PYTORCH_CUDA_TAG:-cu128}"
          echo "pytorch_cuda_tag=${PYTORCH_CUDA_TAG}" >> "$GITHUB_OUTPUT"
          echo "computed comfyui_version=${COMFYUI_VERSION} pytorch_cuda_tag=${PYTORCH_CUDA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:placeholder
          build-args: |
            COMFYUI_VERSION=${{ steps.comfyui.outputs.comfyui_version }}
            PYTORCH_CUDA_TAG=${{ steps.args.outputs.pytorch_cuda_tag }}
          # layer cache: read from GHA backend (scoped to the trigger) and also
          # fall back to the public tag on the registry so cold starts still hit
          # a usable cache after a long gap. Write back in `min` mode to keep
          # the GHA cache size bounded (the heavy layers are PyTorch and
          # ComfyUI's pip tree, both stable across most rebuilds).
          cache-from: |
            type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }},mode=min
          provenance: false

      - name: Read installed PyTorch version
        id: torch
        run: |
          TORCH_VERSION=$(docker run --rm --platform linux/amd64 --entrypoint python3 "${{ env.IMAGE_NAME }}:placeholder" \
            -c "import torch; print(torch.__version__)")
          echo "torch_version=$TORCH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected torch $TORCH_VERSION"

      - name: Tag and push with final tag
        run: |
          # Image tag priority:
          #   1. user-supplied image_tag input (manual dispatch)
          #   2. combined v<comfyui>-<cuda>-pt<torch> (tag push)
          USER_TAG="${{ inputs.image_tag }}"
          if [ -n "$USER_TAG" ]; then
            FINAL_TAG="$USER_TAG"
          else
            COMFYUI_VERSION_NO_V=$(echo "${{ steps.comfyui.outputs.comfyui_version }}" | sed 's/^v//')
            PYTORCH_NO_DOTS=$(echo "${{ steps.torch.outputs.torch_version }}" | tr -d '+cu')
            FINAL_TAG="v${COMFYUI_VERSION_NO_V}-${{ steps.args.outputs.pytorch_cuda_tag }}-pt${PYTORCH_NO_DOTS}"
          fi
          echo "Tagging as ${FINAL_TAG}"
          docker buildx imagetools create \
            -t "${{ env.IMAGE_NAME }}:${FINAL_TAG}" \
            "${{ env.IMAGE_NAME }}:placeholder"
          docker buildx imagetools rm "${{ env.IMAGE_NAME }}:placeholder" 2>&1 || true
