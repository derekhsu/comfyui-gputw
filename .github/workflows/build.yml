name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      comfyui_version:
        description: "ComfyUI release tag (e.g. v0.27.0)"
        required: false
        default: "v0.27.0"
        type: string
      pytorch_cuda_tag:
        description: "PyTorch CUDA tag (e.g. cu118, cu126, cu128)"
        required: false
        default: "cu128"
        type: string

env:
  IMAGE_NAME: derekhsu/comfyui-gputw

jobs:
  build:
    runs-on: ubuntu-latest
    platform: linux/amd64

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine ComfyUI version
        id: comfyui
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # strip leading "v" from the git tag, e.g. v0.27.0 -> 0.27.0
            VERSION="${GITHUB_REF_NAME#v}"
            echo "comfyui_version=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "comfyui_version=${{ inputs.comfyui_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (image tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=placeholder
          flavor: |
            latest=false

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:placeholder
          build-args: |
            COMFYUI_VERSION=${{ steps.comfyui.outputs.comfyui_version }}
            PYTORCH_CUDA_TAG=${{ inputs.pytorch_cuda_tag || 'cu128' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Read installed PyTorch version
        id: torch
        run: |
          # image:tag of the just-built image
          REF="${{ env.IMAGE_NAME }}:placeholder"
          TORCH_VERSION=$(docker run --rm --platform linux/amd64 "$REF" \
            python -c "import torch; print(torch.__version__)")
          echo "torch_version=$TORCH_VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected torch $TORCH_VERSION"

      - name: Retag and push with combined tag
        run: |
          COMFYUI_VERSION_NO_V=$(echo "${{ steps.comfyui.outputs.comfyui_version }}" | sed 's/^v//')
          PYTORCH_NO_DOTS=$(echo "${{ steps.torch.outputs.torch_version }}" | tr -d '+cu')
          COMBINED_TAG="v${COMFYUI_VERSION_NO_V}-${{ inputs.pytorch_cuda_tag || 'cu128' }}-pt${PYTORCH_NO_DOTS}"
          echo "Tagging as ${COMBINED_TAG}"
          docker buildx imagetools create \
            -t "${{ env.IMAGE_NAME }}:${COMBINED_TAG}" \
            "${{ env.IMAGE_NAME }}:placeholder"
          docker buildx imagetools rm "${{ env.IMAGE_NAME }}:placeholder" 2>/dev/null || true
